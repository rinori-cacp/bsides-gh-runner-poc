name: BSides GitHub Hosted Runner PoC

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  demo:
    name: Run on GitHub-hosted Ubuntu runner
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: System Exploration
        run: |
          echo "--- User Identity ---"
          whoami
          id
          
          echo "--- Network Configuration ---"
          ip addr
          curl -s https://ifconfig.me && echo "" # Gets your public egress IP
          
          echo "--- Environment Details ---"
          uname -a
          uptime
          df -h # Check disk space

      - name: Show runner details
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          echo "Workspace: $GITHUB_WORKSPACE"
          pwd
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Note: These steps will fail if the files don't exist in your repo
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping."
          fi

      - name: Run application
        run: |
          if [ -f app.py ]; then
            python app.py
          else
            echo "app.py not found."
          fi

      - name: Build artifact
        run: |
          mkdir -p dist
          [ -f app.py ] && cp app.py dist/
          [ -f requirements.txt ] && cp requirements.txt dist/
          echo "Built on $(date -u)" > dist/build-info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bsides-demo-artifact
          path: dist/
